<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>DigishopID - Premium Digital Store</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c3aed' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 2L2 7l10 5 10-5-10-5z'/%3E%3Cpath d='M2 17l10 5 10-5'/%3E%3Cpath d='M2 12l10 5 10-5'/%3E%3C/svg%3E" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        :root { --primary: #7C3AED; --primary-dark: #5B21B6; --primary-light: #A78BFA; --primary-glow: rgba(124, 58, 237, 0.35); --secondary: #F59E0B; --success: #10B981; --danger: #EF4444; --dark: #0A0616; --dark-card: #14102A; --text: #FFFFFF; --text-muted: #9494B8; --gradient-1: linear-gradient(135deg, #7C3AED 0%, #F59E0B 100%); --radius: 20px; --radius-sm: 12px; --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { font-size: 16px; scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        .bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-orbs .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.12; animation: orbFloat 30s infinite ease-in-out; }
        .bg-orbs .orb:nth-child(1) { width: 600px; height: 600px; background: var(--primary); top: -15%; right: -10%; }
        .bg-orbs .orb:nth-child(2) { width: 450px; height: 450px; background: var(--secondary); bottom: -15%; left: -10%; animation-delay: -10s; }
        .bg-orbs .orb:nth-child(3) { width: 350px; height: 350px; background: var(--success); top: 50%; left: 50%; animation-delay: -20s; opacity: 0.06; }
        @keyframes orbFloat { 0%, 100% { transform: translate(0, 0); } 33% { transform: translate(80px, -100px); } 66% { transform: translate(-60px, 80px); } }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; background: rgba(10, 6, 22, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.04); position: sticky; top: 0; z-index: 500; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; font-size: 1.3rem; font-weight: 900; color: var(--text); }
        .logo-icon { width: 38px; height: 38px; background: var(--gradient-1); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .btn-qris, .btn-cart { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.06); color: var(--text); padding: 8px 14px; border-radius: 50px; font-weight: 700; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .whatsapp-nav { background: #25D366; color: white; padding: 8px 14px; border-radius: 50px; font-weight: 700; font-size: 0.75rem; text-decoration: none; }
        .hero { padding: 40px 0 30px; text-align: center; }
        .hero h1 { font-size: clamp(1.6rem, 5vw, 3.2rem); font-weight: 900; line-height: 1.1; margin-bottom: 12px; }
        .hero h1 .highlight { background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
        .product-card { background: var(--dark-card); border-radius: var(--radius); padding: 16px; border: 1px solid rgba(255, 255, 255, 0.04); text-align: center; cursor: pointer; }
        .product-card:hover { border-color: var(--primary); }
        .btn-select-paket { width: 100%; padding: 8px; border: none; border-radius: 50px; background: var(--primary); color: white; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .modal, .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(16px); z-index: 1001; justify-content: center; align-items: center; }
        .modal-content { background: var(--dark-card); border-radius: var(--radius); padding: 20px; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
        .drawer { position: fixed; top: 0; right: -480px; width: 420px; max-width: 92vw; height: 100dvh; background: var(--dark-card); z-index: 2001; padding: 24px; transition: right 0.35s; display: flex; flex-direction: column; }
        .drawer.open { right: 0; }
        .toast-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 3000; width: 90%; max-width: 380px; }
        .toast { background: var(--dark-card); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: var(--radius-sm); color: white; font-size: 0.85rem; font-weight: 600; animation: fadeIn 0.3s; margin-top: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .page-checkout, .page-payment { display: none; padding: 20px 0; }
        .page-checkout.active, .page-payment.active { display: block; }
    </style>
</head>
<body>
    <div class="bg-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
    
    <nav class="navbar" id="navbar">
        <a href="#" class="logo" onclick="goHome(event)">Digi<span>Shop</span>ID</a>
        <div class="nav-actions">
            <button class="btn-qris" onclick="bukaQris()">QRIS</button>
            <button class="btn-cart" onclick="toggleDrawer()">🛒 <span id="cartBadge">0</span></button>
            <a href="https://wa.me/6283160593305" target="_blank" class="whatsapp-nav">Order</a>
        </div>
    </nav>

    <section class="hero" id="heroSection">
        <div class="container">
            <h1>Layanan Digital <span class="highlight">Premium</span></h1>
            <p>Proses cepat, garansi jelas, harga bersahabat.</p>
        </div>
    </section>

    <div class="container">
        <div class="search-box"><input type="text" id="searchInput" placeholder="Cari layanan..." oninput="cariProduk(this.value)" /></div>
        <div class="filter-row" id="filterContainer">
            <button class="filter-btn active" onclick="filterProduk('all')">Semua</button>
            <button class="filter-btn" onclick="filterProduk('MOVIE')">Movie</button>
            <button class="filter-btn" onclick="filterProduk('DESAIN')">Desain</button>
        </div>
        <div class="product-grid" id="productGrid"></div>
        <div class="page-checkout" id="checkoutPage"></div>
        <div class="page-payment" id="paymentPage"></div>
        <section class="testimoni-section" id="testimoniSection">
            <h2 style="text-align:center; margin-bottom:14px;">💬 Testimoni</h2>
            <div id="testimoniContainer"></div>
        </section>
        <section class="faq-section" id="faqSection">
            <h2 style="text-align:center; margin-bottom:14px;">❓ FAQ</h2>
            <div class="faq-list" id="faqContainer"></div>
        </section>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <div class="modal" id="productModal" onclick="tutupModal()"><div class="modal-content" onclick="event.stopPropagation()"><button onclick="tutupModal()" style="float:right; border:none; background:none; color:white; cursor:pointer;">✕</button><h2 id="modalTitle"></h2><div class="varian-list" id="varianList"></div></div></div>
    <div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
    <div class="drawer" id="cartDrawer">
        <div class="drawer-header"><h2>Keranjang</h2><button onclick="toggleDrawer()" style="border:none; background:none; color:white; cursor:pointer;">✕</button></div>
        <div class="drawer-items" id="drawerItems"></div>
        <button class="btn-checkout-drawer" onclick="proceedToCheckout()">Lanjut pembayaran</button>
    </div>

    <script>
        const produk = [{ id: 'am', nama: 'Alight Motion', kategori: 'DESAIN', varian: [{ id: 'am-1', nama: '1 Tahun', harga: '3000' }] }, { id: 'netflix', nama: 'Netflix', kategori: 'MOVIE', varian: [{ id: 'nf-1', nama: '1 Bulan', harga: '35000' }] }];
        let state = { cart: [], isModalOpen: false, isDrawerOpen: false, isCheckout: false, isPayment: false, selectedProduct: null, formData: { name: '', wa: '', email: '' }, orderData: null, errors: {} };
        const $ = (id) => document.getElementById(id);

        function showToast(message) {
            const container = $('toastContainer');
            container.innerHTML = '';
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function addToCart(productId, variantId) {
            const p = produk.find(p => p.id === productId);
            const v = p?.varian.find(v => v.id === variantId);
            if (!p || !v) return;
            state.cart.push({ productId: p.id, variantId: v.id, name: p.nama, variant: v.nama, price: parseInt(v.harga), icon: p.icon });
            showToast(`${v.nama} berhasil ditambahkan`);
            tutupModal();
            renderAll();
        }

        function toggleDrawer() { 
            state.isDrawerOpen = !state.isDrawerOpen; 
            document.body.style.overflow = state.isDrawerOpen ? 'hidden' : ''; 
            renderAll(); 
        }

        function renderAll() {
            const isHome = !state.isCheckout && !state.isPayment;
            $('heroSection').style.display = isHome ? 'block' : 'none';
            $('testimoniSection').style.display = isHome ? 'block' : 'none';
            $('faqSection').style.display = isHome ? 'block' : 'none';
            $('productGrid').style.display = isHome ? 'grid' : 'none';
            $('filterContainer').style.display = isHome ? 'flex' : 'none';
            $('searchInput').parentElement.style.display = isHome ? 'block' : 'none';
            
            // Render logic here...
            $('cartBadge').textContent = state.cart.length;
        }

        function goHome(e) {
            if (e) e.preventDefault();
            state.isCheckout = state.isPayment = state.isDrawerOpen = state.isModalOpen = false;
            document.body.style.overflow = '';
            renderAll();
        }

        function bukaModal(id) { 
            state.selectedProduct = produk.find(p => p.id === id); 
            state.isModalOpen = true; 
            document.body.style.overflow = 'hidden'; 
            renderAll(); 
        }
        function tutupModal() { 
            state.isModalOpen = false; 
            document.body.style.overflow = ''; 
            renderAll(); 
        }

        // ================================================================
        // FILTER, SEARCH, SORT
        // ================================================================
        let kategoriAktif = 'all', kataKunci = '', urutanAktif = 'default';

        function filterProduk(kategori) {
            kategoriAktif = kategori;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.filter === kategori));
            renderProducts();
        }
        function cariProduk(value) { kataKunci = value; renderProducts(); }
        function urutkanProduk(value) { urutanAktif = value; renderProducts(); }

        function renderProducts() {
            const grid = $('productGrid');
            if (!grid) return;
            if (state.isCheckout || state.isPayment) { grid.style.display = 'none'; return; }
            
            grid.style.display = 'grid';
            let data = produk;
            if (kategoriAktif !== 'all') data = data.filter(p => p.kategori === kategoriAktif);
            if (kataKunci.trim()) {
                const q = kataKunci.trim().toLowerCase();
                data = data.filter(p => p.nama.toLowerCase().includes(q) || p.subtitle.toLowerCase().includes(q));
            }
            if (urutanAktif === 'termurah') data = [...data].sort((a, b) => hargaTermurah(a) - hargaTermurah(b));
            else if (urutanAktif === 'termahal') data = [...data].sort((a, b) => hargaTermurah(b) - hargaTermurah(a));

            if (data.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:30px 0;color:var(--text-muted);"><p style="font-size:clamp(1rem,1.5vw,1.1rem);font-weight:700;">Produk tidak ditemukan</p><p style="font-size:clamp(0.8rem,1vw,0.85rem);">Coba kata kunci lain atau reset filter</p></div>`;
                return;
            }

            grid.innerHTML = data.map(p => `
                <div class="product-card">
                    ${p.badge ? `<span class="badge ${p.badgeClass}">${p.badge}</span>` : ''}
                    <div class="product-icon"><img src="${p.icon}" alt="${p.nama}" loading="lazy" onerror="this.style.display='none'" /></div>
                    <div class="category">${p.kategori}</div>
                    <h3>${p.nama}</h3>
                    <div class="subtitle">${p.subtitle}</div>
                    <div class="price-row">
                        <span class="price-start">${formatRupiah(hargaTermurah(p))} <small>mulai</small></span>
                        <span class="variant-count">${p.varian.length} variasi</span>
                    </div>
                    <button class="btn-select-paket" onclick="event.stopPropagation();bukaModal('${p.id}')">🛍️ Pilih paket</button>
                </div>
            `).join('');
        }

        function renderModal() {
            const modal = $('productModal');
            if (!modal) return;
            if (!state.isModalOpen || !state.selectedProduct) { modal.style.display = 'none'; return; }

            const p = state.selectedProduct;
            modal.style.display = 'flex';
            $('modalTitle').textContent = p.nama;
            $('modalSub').textContent = p.kategori + ' · ' + p.subtitle;
            const img = $('modalImg'); img.src = p.icon; img.onerror = () => img.style.display = 'none'; img.style.display = '';

            $('varianList').innerHTML = p.varian.map(v => `
                <div class="varian-item">
                    <div class="varian-top">
                        <div class="varian-info"><div class="varian-name">${v.nama}</div><div class="varian-desc">${v.desk}</div></div>
                        <div class="varian-price">${formatRupiah(parseHarga(v.harga))}</div>
                    </div>
                    <button class="btn-pilih-varian" onclick="addToCart('${p.id}','${v.id}')">🛍️ Pilih Paket</button>
                </div>
            `).join('');
        }

        function renderDrawer() {
            const overlay = $('drawerOverlay'), drawer = $('cartDrawer');
            if (!overlay || !drawer) return;

            overlay.className = 'drawer-overlay' + (state.isDrawerOpen ? ' open' : '');
            drawer.className = 'drawer' + (state.isDrawerOpen ? ' open' : '');

            if (!state.isDrawerOpen) return;

            $('drawerItemCount').textContent = `(${getCartCount()})`;
            $('cartBadge').textContent = getCartCount();

            const itemsContainer = $('drawerItems'), footer = $('drawerFooter');
            if (state.cart.length === 0) {
                itemsContainer.innerHTML = `<div class="drawer-empty"><span class="empty-icon">🛒</span><p>Keranjang kosong</p><p style="font-size:0.8rem;margin-top:4px;opacity:0.6;">Yuk mulai belanja!</p></div>`;
                footer.style.display = 'none'; return;
            }

            footer.style.display = 'block';
            itemsContainer.innerHTML = state.cart.map((item, idx) => `
                <div class="drawer-item">
                    <div class="item-icon"><img src="${item.icon}" alt="${item.name}" onerror="this.style.display='none'" /></div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-variant">${item.variant}</div>
                        <div class="item-price">${formatRupiah(item.price)}</div>
                    </div>
                    <button class="btn-remove" onclick="removeFromCart(${idx})">✕</button>
                </div>
            `).join('');

            $('drawerOriginal').textContent = formatRupiah(getCartOriginalTotal());
            $('drawerSave').textContent = getCartDiscount() > 0 ? `-${formatRupiah(getCartDiscount())}` : 'Rp 0';
            $('drawerTotal').textContent = formatRupiah(getCartTotal());
        }

        function renderCheckout() {
            const container = $('checkoutPage');
            if (!container) return;

            if (!state.isCheckout) {
                container.className = 'page-checkout'; container.innerHTML = '';
                return; // Tampilan hero dan lainnya dihandle di renderAll
            }

            container.className = 'page-checkout active';
            
            container.innerHTML = `
                <button class="btn-back" onclick="goBackFromCheckout()">← Kembali ke toko</button>
                <div class="checkout-grid">
                    <div class="checkout-form">
                        <h2>LANGKAH TERAKHIR</h2>
                        <div class="form-sub">Lengkapi pesananmu — Pesanan akan dibayar melalui QRIS DigishopID</div>
                        <div class="form-group ${state.errors.name ? 'error' : ''}">
                            <label>Nama lengkap</label>
                            <input type="text" id="inputName" placeholder="Contoh: Budi Santoso" value="${state.formData.name}" oninput="updateForm('name', this.value)" />
                            <div class="error-text">Nama lengkap wajib diisi</div>
                        </div>
                        <div class="form-group ${state.errors.wa ? 'error' : ''}">
                            <label>Nomor WhatsApp</label>
                            <input type="tel" id="inputWa" placeholder="081234567890" value="${state.formData.wa}" oninput="updateForm('wa', this.value)" />
                            <div class="error-text">Nomor WhatsApp wajib diisi</div>
                        </div>
                        <div class="form-group ${state.errors.email ? 'error' : ''}">
                            <label>Email</label>
                            <input type="email" id="inputEmail" placeholder="nama@email.com" value="${state.formData.email}" oninput="updateForm('email', this.value)" />
                            <div class="error-text">Email wajib diisi</div>
                        </div>
                        <div class="form-group">
                            <label>Catatan (opsional)</label>
                            <textarea id="inputNote" placeholder="Contoh: Saya mau pakai untuk Android" oninput="updateForm('note', this.value)">${state.formData.note}</textarea>
                        </div>
                        <div class="payment-method active">
                            <div class="pm-icon">QR</div>
                            <div class="pm-info"><div class="pm-name">QRIS DigishopID</div><div class="pm-desc">Pembayaran manual — verifikasi via WhatsApp</div></div>
                            <span class="pm-check">✓</span>
                        </div>
                        <button class="btn-submit-order" onclick="submitOrder()">Buat pesanan & lihat QRIS — ${formatRupiah(getCartTotal())}</button>
                    </div>
                    <div class="order-summary-card">
                        <h3>📋 Ringkasan Pesanan</h3>
                        ${state.cart.map(item => `<div class="summary-item"><span>${item.name} — ${item.variant}</span><span>${formatRupiah(item.price)}</span></div>`).join('')}
                        ${getCartDiscount() > 0 ? `<div class="summary-item" style="color:var(--success);"><span>Diskon</span><span>-${formatRupiah(getCartDiscount())}</span></div>` : ''}
                        <div class="summary-total"><span>Total</span><span class="total-amount">${formatRupiah(getCartTotal())}</span></div>
                    </div>
                </div>
            `;
        }

        function renderPayment() {
            const container = $('paymentPage');
            if (!container) return;
            if (!state.isPayment || !state.orderData) { container.className = 'page-payment'; container.innerHTML = ''; return; }

            container.className = 'page-payment active';
            const order = state.orderData;

            container.innerHTML = `
                <div class="payment-header">
                    <div class="success-icon">✓</div><div class="success-label">PESANAN BERHASIL DIBUAT</div>
                    <h1>Bayar dengan QRIS</h1><p>Pindai QRIS di bawah untuk menyelesaikan pembayaran</p>
                </div>
                <div class="payment-grid">
                    <div class="qris-card">
                        <div class="qris-label">📱 QRIS DigishopID</div>
                        <div class="qris-image"><img id="qrisToDownload" src="qris.jpg" alt="QRIS DigishopID" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22%3E%3Crect width=%22300%22 height=%22300%22 fill=%22%2314102A%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%239494B8%22 font-family=%22sans-serif%22 font-size=%2216%22%3EQRIS%3C/text%3E%3C/svg%3E'" /></div>
                        <button class="btn-save-qris" onclick="downloadQRIS()" style="width:100%;justify-content:center;background:var(--success);color:white;border:none;padding:10px 16px;border-radius:50px;font-weight:700;font-size:0.85rem;cursor:pointer;transition:var(--transition);font-family:inherit;display:flex;align-items:center;gap:6px;">📥 Simpan gambar QRIS</button>
                    </div>
                    <div class="order-detail-card">
                        <div class="detail-row"><span class="detail-label">KODE PESANAN</span><span class="detail-value code">${order.orderId}</span></div>
                        <div class="detail-row"><span class="detail-label">TOTAL PEMBAYARAN</span><span class="detail-value price">${formatRupiah(order.total)}</span></div>
                        <div class="detail-row"><span class="detail-label">Nama</span><span class="detail-value">${order.name}</span></div>
                        <div class="detail-row"><span class="detail-label">WhatsApp</span><span class="detail-value">${order.wa}</span></div>
                        <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${order.email}</span></div>
                    </div>
                </div>
                <div class="payment-instructions">
                    <div class="inst-title">📝 Instruksi setelah membayar</div>
                    <ol class="inst-list"><li>Simpan bukti transaksi QRIS</li><li>Klik tombol konfirmasi</li><li>Kirim bukti transfer ke WhatsApp Admin</li></ol>
                </div>
                <div class="alert-box"><span class="alert-icon">⏱️</span> Verifikasi manual memakan waktu 1-10 menit.</div>
                <button class="btn-wa-confirm" onclick="confirmPayment()">💬 Saya sudah bayar — Kirim bukti</button>
            `;
        }

        function renderAll() {
            renderProducts(); 
            renderModal(); 
            renderDrawer(); 
            renderCheckout(); 
            renderPayment();
            
            // Atur elemen mana yang tampil berdasarkan halaman saat ini
            const isHome = !state.isCheckout && !state.isPayment;
            
            const hero = document.getElementById('heroSection');
            const testimoni = document.getElementById('testimoniSection');
            const searchBox = document.querySelector('.search-box');
            const filterRow = document.querySelector('.filter-row');
            const faq = document.querySelector('.faq-section');
            
            if (hero) hero.style.display = isHome ? 'block' : 'none';
            if (testimoni) testimoni.style.display = isHome ? 'block' : 'none';
            if (searchBox) searchBox.style.display = isHome ? 'block' : 'none';
            if (filterRow) filterRow.style.display = isHome ? 'flex' : 'none';
            if (faq) faq.style.display = isHome ? 'block' : 'none';

            if (document.getElementById('cartBadge')) {
                document.getElementById('cartBadge').textContent = getCartCount();
            }
        }

        // ================================================================
        // CHECKOUT & PAYMENT ACTIONS
        // ================================================================
        function proceedToCheckout() {
            if (state.cart.length === 0) { showToast('⚠️ Kosong', 'Tambahkan produk dulu!', 'warning'); return; }
            state.isDrawerOpen = false; state.isCheckout = true; state.errors = {}; 
            document.body.style.overflow = ''; // Lepas scroll saat ke checkout
            renderAll();
        }

        function goBackFromCheckout() {
            if (!confirm('Kembali ke toko? Data yang diisi akan hilang.')) return;
            state.isCheckout = false; state.formData = { name: '', wa: '', email: '', note: '' }; state.errors = {}; renderAll();
        }

        function updateForm(field, value) {
            state.formData[field] = value;
            if (state.errors[field]) {
                state.errors[field] = false;
                const inputId = 'input' + field.charAt(0).toUpperCase() + field.slice(1);
                const inputElement = document.getElementById(inputId);
                if (inputElement && inputElement.closest('.form-group')) {
                    inputElement.closest('.form-group').classList.remove('error');
                }
            }
        }

        function submitOrder() {
            const { name, wa, email } = state.formData, errors = {};
            if (!name.trim()) errors.name = true; if (!wa.trim()) errors.wa = true; if (!email.trim()) errors.email = true;
            
            if (Object.keys(errors).length > 0) {
                state.errors = errors; renderAll(); showToast('⚠️ Data belum lengkap', 'Isi form yang wajib', 'warning'); return;
            }

            state.orderData = { orderId: generateOrderId(), name: name.trim(), wa: wa.trim(), email: email.trim(), note: state.formData.note.trim(), items: [...state.cart], total: getCartTotal() };
            state.isCheckout = false; state.isPayment = true; renderAll();
        }

        function confirmPayment() {
            const order = state.orderData; if (!order) return;
            const itemsText = order.items.map(i => `- ${i.name} (${i.variant}) = ${formatRupiah(i.price)}`).join('\n');
            const message = encodeURIComponent(
                `HALO ADMIN DIGISHOPID! 🙏\n\nSAYA SUDAH BAYAR! 💰\n━━━━━━━━━━━━━━━━━━━━\n🆔 KODE PESANAN: ${order.orderId}\n👤 NAMA: ${order.name}\n📱 WHATSAPP: ${order.wa}\n📧 EMAIL: ${order.email}\n━━━━━━━━━━━━━━━━━━━━\n📦 DETAIL PESANAN:\n${itemsText}\n━━━━━━━━━━━━━━━━━━━━\n💵 TOTAL: ${formatRupiah(order.total)}\n━━━━━━━━━━━━━━━━━━━━\n📸 BUKTI TRANSFER MENYUSUL!`
            );
            window.open(`https://wa.me/6283160593305?text=${message}`, '_blank');
        }

        function goHome(e) {
            if (e) e.preventDefault();
            if ((state.isCheckout || state.isPayment) && !confirm('Kembali ke toko? Data pesanan akan hilang.')) return;
            state.isCheckout = state.isPayment = state.isDrawerOpen = state.isModalOpen = false;
            state.orderData = null; state.formData = { name: '', wa: '', email: '', note: '' }; state.errors = {}; 
            document.body.style.overflow = ''; // Lepas semua scroll lock
            renderAll();
        }

        // ================================================================
        // QRIS FIX
        // ================================================================
        function bukaQris() { $('qrisModal').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function tutupQris() {
            const m = $('qrisModal'); m.classList.add('closing');
            setTimeout(() => { m.style.display = 'none'; m.classList.remove('closing'); document.body.style.overflow = ''; }, 250);
        }
        
        function downloadQRIS() {
            const imgSrc = $('qrisImage') ? $('qrisImage').src : $('qrisToDownload').src;
            
            fetch(imgSrc)
                .then(response => response.blob())
                .then(blob => {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = 'QRIS-DigishopID.jpg';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    showToast('✅ QRIS Tersimpan!', 'Gambar berhasil disimpan.', 'success');
                })
                .catch(err => {
                    const link = document.createElement('a');
                    link.href = imgSrc;
                    link.download = 'QRIS-DigishopID.jpg';
                    link.target = "_blank";
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    showToast('✅ QRIS Dibuka!', 'Silakan simpan gambar secara manual.', 'success');
                });
        }

        // ================================================================
        // TESTIMONI & FAQ
        // ================================================================
        function renderTestimoni() {
            const container = $('testimoniContainer'); if (!container) return;
            container.innerHTML = `<div class="testimoni-grid">${testimoniData.map(t => `<div class="testimoni-card"><div class="stars">${'★'.repeat(t.bintang)}${'☆'.repeat(5-t.bintang)}</div><div class="quote">"${t.isi}"</div><div class="name">${t.nama}</div></div>`).join('')}</div>`;
        }
        function renderFaq() {
            const container = $('faqContainer'); if (!container) return;
            container.innerHTML = faqData.map((f, i) => `<div class="faq-item" id="faq-${i}"><button class="faq-question" onclick="toggleFaq(${i})"><span>${f.q}</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg></button><div class="faq-answer">${f.a}</div></div>`).join('');
        }
        function toggleFaq(i) {
            const item = $('faq-' + i); if (!item) return;
            const open = item.classList.toggle('open');
            item.querySelector('.faq-question').setAttribute('aria-expanded', open);
        }

        // ================================================================
        // GLOBAL EVENTS
        // ================================================================
        window.addEventListener('scroll', () => { const nav = $('navbar'); if (nav) nav.classList.toggle('scrolled', window.scrollY > 50); });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { if (state.isModalOpen) tutupModal(); if (state.isDrawerOpen) toggleDrawer(); if ($('qrisModal').style.display === 'flex') tutupQris(); }
        });

        // INIT
        renderAll(); renderTestimoni(); renderFaq();
        
    </script>
</body>
</html>
